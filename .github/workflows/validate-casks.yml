name: Validate Casks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate updater script
        run: python3 -m py_compile scripts/update_casks.py

      - name: Validate cask syntax
        run: |
          for file in Casks/*.rb; do
            ruby -c "$file"
          done

      - name: Register local tap
        run: |
          TAP_DIR="$(brew --repository)/Library/Taps/kwong/homebrew-tap"
          mkdir -p "$(dirname "$TAP_DIR")"
          rm -rf "$TAP_DIR"
          ln -s "$GITHUB_WORKSPACE" "$TAP_DIR"

      - name: Audit casks
        run: |
          for file in Casks/*.rb; do
            token="$(basename "$file" .rb)"
            HOMEBREW_NO_INSTALL_FROM_API=1 brew audit --cask "kwong/tap/$token"
          done
